name: Production Company Rollout From URL V5

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/prod-company-rollout-from-url-v5.yml"

concurrency:
  group: prod-company-rollout-from-url-v5
  cancel-in-progress: false

jobs:
  rollout:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Wait for deploy workflow
        run: sleep 180

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Download legacy company export
        run: |
          mkdir -p custom/data
          curl -fSL "https://jiu.cnzhengmu.com/uploads/tmp-import/legacy-companies-ae5cd3251a3a40888b71a772a461a5ba.json" -o custom/data/legacy-companies-export.json
          node -e "const fs=require('node:fs'); const rows=JSON.parse(fs.readFileSync('custom/data/legacy-companies-export.json','utf8')); console.log('::warning::LEGACY_EXPORT_COUNT=' + rows.length);"

      - name: Upload legacy company export to production
        run: |
          ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p /home/web1/custom/data"
          scp -o BatchMode=yes custom/data/legacy-companies-export.json ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/web1/custom/data/legacy-companies-export.json

      - name: Run production import build and restart
        run: |
          ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            cd /home/web1
            mkdir -p custom/reports custom/backups

            if [ -f .env.production ]; then
              export DATABASE_URL=$(grep '^DATABASE_URL=' .env.production | head -n 1 | cut -d '=' -f 2- | tr -d '"')
            elif [ -f .env ]; then
              export DATABASE_URL=$(grep '^DATABASE_URL=' .env | head -n 1 | cut -d '=' -f 2- | tr -d '"')
            fi

            if command -v pg_dump >/dev/null 2>&1 && [ -n "$DATABASE_URL" ]; then
              backup_path="custom/backups/postgres-backup-$(date +%Y-%m-%dT%H-%M-%S).dump"
              pg_dump "$DATABASE_URL" > "$backup_path"
              echo "::warning::PROD_BACKUP_PATH=$backup_path"
            fi

            report_path="custom/reports/company-migration-apply-$(date +%Y-%m-%dT%H-%M-%S).json"
            npx ts-node --transpile-only scripts/import-legacy-companies-v2.ts --input custom/data/legacy-companies-export.json --apply --report "$report_path"
            npm run build
            sudo systemctl restart web1
            echo "::warning::PROD_REPORT_PATH=$report_path"
          EOF

      - name: Summarize production state
        run: |
          ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            cd /home/web1
            latest_report=$(ls -t custom/reports/company-migration-apply-*.json | head -n 1)
            node -e "const fs=require('node:fs'); const rows=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); console.log('::warning::PROD_IMPORTED_COUNT=' + rows.length); rows.slice(0,3).forEach((row,index)=>{ console.log('::warning::PROD_SAMPLE_' + (index + 1) + '=https://cnzhengmu.com/enterprise/' + row.enterpriseId); });" "$latest_report"
            node -e "const {PrismaClient}=require('@prisma/client'); (async()=>{ const prisma=new PrismaClient(); try { console.log('::warning::PROD_VISIBLE_BRAND_COUNT=' + await prisma.brand.count({where:{isBrandVisible:true}})); console.log('::warning::PROD_ENTERPRISE_COUNT=' + await prisma.enterprise.count()); console.log('::warning::PROD_MISSING_LOGO_COUNT=' + await prisma.brand.count({where:{isBrandVisible:true, OR:[{logoUrl:null},{logoUrl:''}]}})); console.log('::warning::PROD_EMPTY_INTRO_COUNT=' + await prisma.enterprise.count({where:{OR:[{intro:null},{intro:''}]}})); } finally { await prisma.$disconnect(); } })().catch((error)=>{ console.error(error); process.exit(1); });"
          EOF

      - name: Verify public pages
        run: |
          sleep 8
          node -e "async function fetchText(url){ const response=await fetch(url,{redirect:'follow'}); return { status: response.status, url: response.url, text: await response.text() }; } function countUniqueEnterpriseLinks(html){ return new Set([...html.matchAll(/href=\"\\/enterprise\\/([^\"#?]+)\"/g)].map((match)=>match[1])).size; } (async()=>{ const brands=await fetchText('https://cnzhengmu.com/brands'); const brandsAll=await fetchText('https://cnzhengmu.com/brands/all'); const brandsDisplayCount=countUniqueEnterpriseLinks(brands.text); const brandsAllDisplayCount=countUniqueEnterpriseLinks(brandsAll.text); const totalMatch=brandsAll.text.match(/共\\s*<!-- -->(\\d+)<!-- -->\\s*家|共\\s*(\\d+)\\s*家/); const totalCount=totalMatch ? Number(totalMatch[1] || totalMatch[2] || 0) : 0; const detailLinks=[...new Set([...brandsAll.text.matchAll(/href=\"(\\/enterprise\\/[^\"#?]+)\"/g)].map((match)=>`https://cnzhengmu.com${match[1]}`))].slice(0,3); console.log('::warning::PUBLIC_BRANDS_STATUS=' + brands.status); console.log('::warning::PUBLIC_BRANDS_DISPLAY_COUNT=' + brandsDisplayCount); console.log('::warning::PUBLIC_BRANDS_ALL_STATUS=' + brandsAll.status); console.log('::warning::PUBLIC_BRANDS_ALL_PAGE_COUNT=' + brandsAllDisplayCount); console.log('::warning::PUBLIC_BRANDS_ALL_TOTAL=' + totalCount); for (const [index, link] of detailLinks.entries()){ const detail=await fetchText(link); console.log('::warning::PUBLIC_DETAIL_' + (index + 1) + '=' + detail.url); console.log('::warning::PUBLIC_DETAIL_STATUS_' + (index + 1) + '=' + detail.status); } })().catch((error)=>{ console.error(error); process.exit(1); });"
