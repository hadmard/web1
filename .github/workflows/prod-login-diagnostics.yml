name: Production Login Diagnostics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/api/auth/login/route.ts"
      - ".github/workflows/prod-login-diagnostics.yml"

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Wait for deploy and login attempts
        run: sleep 300

      - name: Inspect production login chain
        run: |
          diag=$(ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            cd /home/web1

            echo "== LOGIN ENV CHECK =="
            if [ -f .env.production ]; then
              grep -E '^(JWT_SECRET|DATABASE_URL)=' .env.production | sed 's/=.*/=[redacted]/'
            elif [ -f .env ]; then
              grep -E '^(JWT_SECRET|DATABASE_URL)=' .env | sed 's/=.*/=[redacted]/'
            else
              echo "env_file_missing"
            fi

            echo "== LOGIN ROUTE HEAD =="
            sed -n '1,220p' app/api/auth/login/route.ts

            echo "== LOGIN JOURNAL LAST 200 =="
            sudo journalctl -u web1 --since '20 minutes ago' --no-pager -n 200 || true
            echo "== LOGIN FATAL ONLY =="
            sudo journalctl -u web1 --since '20 minutes ago' --no-pager -n 200 | grep -F '[login] fatal_error' || true

            echo "== MEMBERS TABLE COLUMNS =="
            node -e "const { PrismaClient } = require('@prisma/client'); const prisma = new PrismaClient(); (async () => { try { const cols = await prisma.\$queryRawUnsafe(\"select column_name from information_schema.columns where table_name = 'members' order by ordinal_position\"); console.log(JSON.stringify(cols, null, 2)); } finally { await prisma.\$disconnect(); } })().catch((error) => { console.error(error); process.exit(1); });"

            echo "== TEST QUERY MEMBER ACCOUNT =="
            node -e 'const bcrypt = require("bcryptjs"); const { PrismaClient } = require("@prisma/client"); const prisma = new PrismaClient(); (async () => { try { const member = await prisma.member.findUnique({ where: { email: "63fee8ab0d110" }, select: { id: true, email: true, role: true, memberType: true, passwordHash: true, failedLoginCount: true, lockedUntil: true, lastLoginAt: true } }); const compareOk = member ? await bcrypt.compare("Cnzm#134230006", member.passwordHash) : null; console.log(JSON.stringify({ found: Boolean(member), compareOk, hashLength: member?.passwordHash?.length ?? null, member: member ? { id: member.id, email: member.email, role: member.role, memberType: member.memberType, failedLoginCount: member.failedLoginCount, lockedUntil: member.lockedUntil, lastLoginAt: member.lastLoginAt } : null }, null, 2)); } finally { await prisma.$disconnect(); } })().catch((error) => { console.error(error); process.exit(1); });'

            echo "== TEST QUERY ADMIN ACCOUNT =="
            node -e 'const bcrypt = require("bcryptjs"); const { PrismaClient } = require("@prisma/client"); const prisma = new PrismaClient(); (async () => { try { const member = await prisma.member.findUnique({ where: { email: "yfcccc" }, select: { id: true, email: true, role: true, memberType: true, passwordHash: true, failedLoginCount: true, lockedUntil: true, lastLoginAt: true } }); const compareOk = member ? await bcrypt.compare("admin", member.passwordHash) : null; console.log(JSON.stringify({ found: Boolean(member), compareOk, hashLength: member?.passwordHash?.length ?? null, member: member ? { id: member.id, email: member.email, role: member.role, memberType: member.memberType, failedLoginCount: member.failedLoginCount, lockedUntil: member.lockedUntil, lastLoginAt: member.lastLoginAt } : null }, null, 2)); } finally { await prisma.$disconnect(); } })().catch((error) => { console.error(error); process.exit(1); });'
          EOF
          )

          printf '%s\n' "$diag"

          if printf '%s\n' "$diag" | grep -q '\[login\] fatal_error'; then
            fatal_line=$(printf '%s\n' "$diag" | grep -F '[login] fatal_error' | tail -n 1 | tr -d '\r')
            echo "::error title=Production login fatal error::$fatal_line"
          fi

          if printf '%s\n' "$diag" | grep -q 'env_file_missing'; then
            echo "::error title=Production env missing::No .env.production or .env file was found under /home/web1"
          fi

          if ! printf '%s\n' "$diag" | grep -q 'JWT_SECRET=\[redacted\]'; then
            echo "::error title=JWT_SECRET missing::JWT_SECRET is missing from the production env file"
          fi

          if ! printf '%s\n' "$diag" | grep -q 'DATABASE_URL=\[redacted\]'; then
            echo "::error title=DATABASE_URL missing::DATABASE_URL is missing from the production env file"
          fi

          if printf '%s\n' "$diag" | grep -q '"found": false'; then
            echo "::error title=Missing login account::At least one tested account does not exist in the production members table"
          fi

          if printf '%s\n' "$diag" | grep -q '"compareOk": false'; then
            echo "::error title=Password hash mismatch::At least one tested password does not match the stored production hash"
          fi

          if ! printf '%s\n' "$diag" | grep -q '"passwordHash"'; then
            echo "::warning title=Password hash redacted::The diagnostic output does not expose passwordHash values by design"
          fi
