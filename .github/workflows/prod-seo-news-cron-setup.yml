name: Setup SEO News Cron

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/prod-seo-news-cron-setup.yml"
      - "scripts/run-seo-news-cron.sh"

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Manual verify and install cron
        shell: bash
        run: |
          ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} <<'EOF'
            set -euo pipefail

            cd /home/web1

            echo "::warning::SEO_CRON_WAIT=waiting_for_active_deploy_processes"
            for _ in $(seq 1 36); do
              if pgrep -af 'npm ci|npm install|next build|git fetch origin main|git reset --hard origin/main' >/dev/null 2>&1; then
                sleep 10
              else
                break
              fi
            done

            git fetch origin main
            git reset --hard origin/main
            sed -i 's/\r$//' /home/web1/scripts/run-seo-news-cron.sh

            user_name="$(whoami)"
            project_dir="$(pwd)"
            if [ -f .env.production ]; then
              env_file="/home/web1/.env.production"
            elif [ -f .env ]; then
              env_file="/home/web1/.env"
            else
              env_file="missing"
            fi

            mkdir -p /home/web1/logs

            echo "::warning::SEO_CRON_PROJECT_DIR=${project_dir}"
            echo "::warning::SEO_CRON_USER=${user_name}"
            echo "::warning::SEO_CRON_ENV_FILE=${env_file}"
            echo "::warning::SEO_CRON_MANUAL_COMMAND=/bin/bash /home/web1/scripts/run-seo-news-cron.sh --count 2 --mode manual"

            manual_start="$(date -Iseconds)"
            set +e
            /bin/bash /home/web1/scripts/run-seo-news-cron.sh --count 2 --mode manual
            manual_exit=$?
            set -e

            if [ "$manual_exit" -ne 0 ]; then
              echo "::error::SEO_CRON_MANUAL_EXIT=${manual_exit}"
              echo "::error::SEO_CRON_LOG_TAIL_BEGIN"
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "::error::${line}"
                fi
              done < <(tail -n 120 /home/web1/logs/seo-news-cron.log || true)
              echo "::error::SEO_CRON_LOG_TAIL_END"
              exit "$manual_exit"
            fi

            manual_verify="$(
              cd /home/web1
              if [ -f "$env_file" ]; then
                set -a
                # shellcheck disable=SC1090
                . "$env_file"
                set +a
              fi
              node - "$manual_start" <<'NODE'
              const { PrismaClient } = require("@prisma/client");

              const prisma = new PrismaClient();
              const since = new Date(process.argv[2]);

              (async () => {
                const latest = await prisma.article.findFirst({
                  where: {
                    source: "auto_seo_generator",
                    createdAt: { gte: since },
                  },
                  orderBy: [{ createdAt: "desc" }],
                  select: {
                    generationBatchId: true,
                  },
                });

                if (!latest?.generationBatchId) {
                  console.log("");
                  return;
                }

                const rows = await prisma.article.findMany({
                  where: {
                    generationBatchId: latest.generationBatchId,
                  },
                  orderBy: [{ createdAt: "asc" }],
                  select: {
                    title: true,
                    slug: true,
                    status: true,
                    source: true,
                    categoryHref: true,
                    subHref: true,
                  },
                });

                console.log(
                  JSON.stringify({
                    generationBatchId: latest.generationBatchId,
                    savedCount: rows.length,
                    pendingCount: rows.filter((row) => row.status === "pending").length,
                    autoSeoCount: rows.filter((row) => row.source === "auto_seo_generator").length,
                    statuses: Array.from(new Set(rows.map((row) => row.status))),
                    items: rows.map((row) => ({
                      title: row.title,
                      slug: row.slug,
                      status: row.status,
                      categoryHref: row.categoryHref,
                      subHref: row.subHref,
                    })),
                  })
                );
              })()
                .catch(() => {
                  console.log("");
                  process.exit(0);
                })
                .finally(async () => {
                  await prisma.$disconnect();
                });
              NODE
            )"
            if [ -z "$manual_verify" ]; then
              echo "::error::SEO_CRON_MANUAL_RESULT_MISSING"
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "::error::${line}"
                fi
              done < <(tail -n 120 /home/web1/logs/seo-news-cron.log || true)
              exit 1
            fi

            echo "::warning::SEO_CRON_MANUAL_RESULT=${manual_verify}"

            tmp_cron="$(mktemp)"
            {
              crontab -l 2>/dev/null | grep -v '/home/web1/scripts/run-seo-news-cron.sh' || true
              echo "30 7 * * * /bin/bash /home/web1/scripts/run-seo-news-cron.sh --count 2"
            } > "$tmp_cron"
            crontab "$tmp_cron"
            rm -f "$tmp_cron"

            next_run="$(date -d 'tomorrow 07:30' '+%Y-%m-%d %H:%M:%S %Z' 2>/dev/null || true)"
            current_cron="$(crontab -l | tr '\n' ';')"

            echo "::warning::SEO_CRON_INSTALLED=30 7 * * * /bin/bash /home/web1/scripts/run-seo-news-cron.sh --count 2"
            echo "::warning::SEO_CRON_LOG_FILE=/home/web1/logs/seo-news-cron.log"
            echo "::warning::SEO_CRON_NEXT_RUN=${next_run}"
            echo "::warning::SEO_CRON_PAUSE=crontab -l | grep -v '/home/web1/scripts/run-seo-news-cron.sh' | crontab -"
            echo "::warning::SEO_CRON_CURRENT=${current_cron}"
          EOF
