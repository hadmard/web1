name: Deploy to Server

on:
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Print CI runtime versions
        run: |
          echo "::notice::[validate] node=$(node -v)"
          echo "::notice::[validate] npm=$(npm -v)"

      - name: Enforce Node 20 in CI
        run: |
          NODE_MAJOR=$(node -v | sed 's/v//' | cut -d. -f1)
          if [ "$NODE_MAJOR" -ne 20 ]; then
            echo "❌ Node version must be 20.x"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build application
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    env:
      DEPLOY_HOST: "123.60.14.103"
      DEPLOY_USER: "root"
      DEPLOY_PORT: "22"
      DEPLOY_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.SERVER_SSH_KEY }}

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          if [ -z "${DEPLOY_PRIVATE_KEY}" ]; then
            echo "::error::[deploy] missing SSH private key secret; expected SSH_PRIVATE_KEY or SERVER_SSH_KEY"
            exit 1
          fi
          if [ -z "${DEPLOY_HOST}" ]; then
            echo "::error::[deploy] missing SERVER_HOST secret"
            exit 1
          fi
          if [ -z "${DEPLOY_USER}" ]; then
            echo "::error::[deploy] missing SERVER_USER secret"
            exit 1
          fi
          printf '%s\n' "${DEPLOY_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Inspect live production target
        run: |
          diag=$(ssh -o BatchMode=yes -p "${DEPLOY_PORT}" ${DEPLOY_USER}@${DEPLOY_HOST} "bash -s" <<'EOF'
            set -e

            host_name=$(hostname 2>/dev/null || true)
            host_ips=$(hostname -I 2>/dev/null | tr '\n' ';' || true)
            server_node=$(node -v 2>/dev/null || true)
            server_npm=$(npm -v 2>/dev/null || true)
            web1_detail=$(systemctl show web1 --no-pager -p Id -p ActiveState -p FragmentPath -p WorkingDirectory -p ExecStart -p EnvironmentFile 2>/dev/null | tr '\n' ';')
            services=$(systemctl list-units --type=service --all --no-pager | grep -Ei 'web1|node|next|pm2|cnzhengmu' | tr -s ' ' | tr '\n' ';' || true)
            ports=$(sudo ss -ltnp | grep -E ':80 |:443 |:3000 |:3001 |:3002 |:3010 |:3011 ' | tr '\n' ';' || true)
            nginx=$(sudo nginx -T 2>/dev/null | grep -nE 'server_name|proxy_pass|root |cnzhengmu\.com|www\.cnzhengmu\.com|127\.0\.0\.1|localhost|/home/web1' -C 2 | head -n 40 | tr '\n' ';' || true)

            if [ -f /home/web1/.env.production ]; then
              db_url=$(grep '^DATABASE_URL=' /home/web1/.env.production | head -n 1 | cut -d '=' -f 2- | tr -d '"')
            elif [ -f /home/web1/.env ]; then
              db_url=$(grep '^DATABASE_URL=' /home/web1/.env | head -n 1 | cut -d '=' -f 2- | tr -d '"')
            else
              db_url=""
            fi

            if [ -n "$db_url" ]; then
              db_no_proto=$(printf '%s' "$db_url" | sed -E 's#^postgres(ql)?://##')
              db_host=$(printf '%s' "$db_no_proto" | sed -E 's#^[^@]*@([^:/?]+).*#\1#')
              db_port=$(printf '%s' "$db_no_proto" | sed -En 's#^[^@]*@[^:/?]+:([0-9]+).*#\1#p')
              db_name=$(printf '%s' "$db_no_proto" | sed -E 's#^[^/]*/([^?]+).*#\1#')
              if [ -z "$db_port" ]; then
                db_port="5432"
              fi
              db_target="db_host=$db_host;db_port=$db_port;db_name=$db_name"
            else
              db_target="db_url_not_found"
            fi

            echo "HOST_NAME=$host_name"
            echo "HOST_IPS=$host_ips"
            echo "SERVER_NODE=$server_node"
            echo "SERVER_NPM=$server_npm"
            echo "WEB1_DETAIL=$web1_detail"
            echo "SERVICES=$services"
            echo "PORTS=$ports"
            echo "NGINX=$nginx"
            echo "DB_TARGET=$db_target"
          EOF
          )

          while IFS= read -r line; do
            if [ -n "$line" ]; then
              echo "::warning::$line"
            fi
          done <<< "$diag"

      - name: Deploy to Server
        run: |
          ssh -o BatchMode=yes -p "${DEPLOY_PORT}" ${DEPLOY_USER}@${DEPLOY_HOST} << 'EOF'
            set -euo pipefail
            cd /home/web1
            stage="bootstrap"
            BACKUP_MARKER_FILE="/tmp/web1-next-backup-path"

            on_error() {
              code=$?
              echo "::error::[deploy] stage=${stage} command=${BASH_COMMAND} exit_code=${code}"
              sudo systemctl status web1 --no-pager -l || true
              exit "$code"
            }
            trap on_error ERR

            load_env() {
              if [ -f .env.production ]; then
                set -a
                . ./.env.production
                set +a
                echo "[deploy] loaded .env.production"
              elif [ -f .env ]; then
                set -a
                . ./.env
                set +a
                echo "[deploy] loaded .env"
              else
                echo "[deploy] no env file found in /home/web1"
              fi
            }

            cleanup_build_worktree() {
              if [ -n "${BUILD_WORKTREE:-}" ] && [ -d "${BUILD_WORKTREE}" ]; then
                rm -rf "${BUILD_WORKTREE}"
                echo "::notice::[deploy] removed staged build worktree ${BUILD_WORKTREE}"
              fi
            }

            restore_next_backup() {
              if [ -n "${NEXT_BACKUP_DIR:-}" ] && [ -d "${NEXT_BACKUP_DIR}" ]; then
                rm -rf .next
                mv "${NEXT_BACKUP_DIR}" .next
                rm -f "${BACKUP_MARKER_FILE}"
                echo "::warning::[deploy] restored previous .next backup"
              fi
            }

            stage="workspace-preflight"
            workspace_status="$(git status --porcelain)"
            if [ -n "${workspace_status}" ]; then
              echo "::error::[deploy] production worktree is not clean; refusing to reset or clean"
              printf '%s\n' "${workspace_status}"
              exit 1
            fi

            stage="uploads-preflight"
            uploads_path="/home/web1/public/uploads"
            if [ ! -e "${uploads_path}" ]; then
              echo "::error::[deploy] uploads path does not exist: ${uploads_path}"
              exit 1
            fi
            if [ ! -d "${uploads_path}" ]; then
              echo "::error::[deploy] uploads path is not a directory: ${uploads_path}"
              exit 1
            fi
            if [ -L "${uploads_path}" ]; then
              echo "::error::[deploy] uploads path must not be a symbolic link: ${uploads_path}"
              exit 1
            fi
            resolved_uploads_path="$(readlink -f -- "${uploads_path}")"
            if [ "${resolved_uploads_path}" != "${uploads_path}" ]; then
              echo "::error::[deploy] uploads path resolved unexpectedly: ${resolved_uploads_path}"
              exit 1
            fi

            stage="git"
            echo "[deploy] fetching latest main"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd \
              -e .next \
              -e logs/ \
              -e public/uploads/

            stage="install"
            NODE_MAJOR=$(node -v | sed 's/v//' | cut -d. -f1)
            if [ "$NODE_MAJOR" -ne 20 ]; then
              echo "❌ Server Node version must be 20.x"
              exit 1
            fi
            echo "[deploy] installing dependencies"
            if ! npm ci --no-audit --no-fund; then
              echo "::warning::[deploy] npm ci failed, falling back to npm install"
              npm install --include=dev --no-audit --no-fund
            fi

            stage="env"
            load_env
            echo "::warning::[deploy] DATABASE_URL present: ${DATABASE_URL:+yes}"

            stage="prisma-generate"
            echo "[deploy] generating prisma client"
            npx prisma generate

            stage="build-prepare"
            echo "[deploy] preparing isolated next build"
            DEPLOY_COMMIT="$(git rev-parse HEAD)"
            BUILD_WORKTREE="/tmp/web1-build-${DEPLOY_COMMIT:0:12}-$$"
            rm -rf "${BUILD_WORKTREE}"
            mkdir -p "${BUILD_WORKTREE}"
            git archive "${DEPLOY_COMMIT}" | tar -x -C "${BUILD_WORKTREE}"
            ln -s /home/web1/node_modules "${BUILD_WORKTREE}/node_modules"
            if [ -f .env.production ]; then
              cp .env.production "${BUILD_WORKTREE}/.env.production"
            elif [ -f .env ]; then
              cp .env "${BUILD_WORKTREE}/.env"
            fi

            stage="build"
            echo "[deploy] building next app in ${BUILD_WORKTREE}"
            export NODE_OPTIONS="${NODE_OPTIONS:---max-old-space-size=4096}"
            export NEXT_TELEMETRY_DISABLED=1
            echo "::warning::[deploy] memory before build"
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                echo "::warning::[deploy] ${line}"
              fi
            done < <(free -h 2>/dev/null || true)
            set +e
            (
              cd "${BUILD_WORKTREE}"
              npm run build
            ) > /tmp/web1-build.log 2>&1
            build_exit_code=$?
            set -e
            if [ "$build_exit_code" -ne 0 ]; then
              echo "::error::[deploy] build exit code=${build_exit_code}"
              echo "::error::[deploy] memory after build failure"
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "::error::[deploy] ${line}"
                fi
              done < <(free -h 2>/dev/null || true)
              echo "::error::[deploy] dmesg tail begin"
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "::error::[deploy] ${line}"
                fi
              done < <(sudo dmesg 2>/dev/null | tail -n 50 || true)
              echo "::error::[deploy] dmesg tail end"
              echo "::error::[deploy] build output begin"
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "::error::[deploy] ${line}"
                fi
              done < <(sed -n '1,220p' /tmp/web1-build.log)
              echo "::error::[deploy] build output tail begin"
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "::error::[deploy] ${line}"
                fi
              done < <(tail -n 120 /tmp/web1-build.log)
              echo "::error::[deploy] build output tail end"
              echo "::error::[deploy] build output end"
              cleanup_build_worktree
              exit "$build_exit_code"
            fi

            stage="verify-build"
            STAGED_NEXT_DIR="${BUILD_WORKTREE}/.next"
            if [ ! -d "${STAGED_NEXT_DIR}" ]; then
              echo "::error::[deploy] staged .next directory missing: ${STAGED_NEXT_DIR}"
              cleanup_build_worktree
              exit 1
            fi
            if [ ! -f "${STAGED_NEXT_DIR}/server/app/membership/admin/content/page.js" ]; then
              echo "::error::[deploy] required admin content bundle missing: ${STAGED_NEXT_DIR}/server/app/membership/admin/content/page.js"
              cleanup_build_worktree
              exit 1
            fi
            if [ ! -f "${STAGED_NEXT_DIR}/server/app/membership/content/publish/page.js" ]; then
              echo "::error::[deploy] required membership publish bundle missing: ${STAGED_NEXT_DIR}/server/app/membership/content/publish/page.js"
              cleanup_build_worktree
              exit 1
            fi
            echo "::notice::[deploy] staged bundle verified"

            stage="prisma-migrate"
            echo "[deploy] applying Prisma migrations"
            if ! npx prisma migrate deploy; then
              echo "::error::[deploy] Prisma migration failed; deployment stopped without changing .next"
              cleanup_build_worktree
              exit 1
            fi

            stage="stop-service"
            echo "[deploy] stopping web1 before .next swap"
            sudo systemctl stop web1

            stage="swap-next"
            NEXT_BACKUP_DIR=""
            if [ -d .next ]; then
              NEXT_BACKUP_DIR="/home/web1/.next-backup-$(date +%s)"
              rm -rf "${NEXT_BACKUP_DIR}"
              mv .next "${NEXT_BACKUP_DIR}"
              printf '%s\n' "${NEXT_BACKUP_DIR}" > "${BACKUP_MARKER_FILE}"
              echo "::warning::[deploy] moved existing .next to ${NEXT_BACKUP_DIR}"
            else
              rm -f "${BACKUP_MARKER_FILE}"
            fi
            mv "${STAGED_NEXT_DIR}" /home/web1/.next
            cleanup_build_worktree

            stage="restart"
            echo "[deploy] restarting web1"
            if ! sudo systemctl restart web1; then
              echo "::error::[deploy] web1 restart failed, dumping service logs"
              restore_next_backup
              cleanup_build_worktree
              sudo systemctl status web1 --no-pager -l || true
              sudo journalctl -u web1 -n 120 --no-pager || true
              exit 1
            fi
            stage="verify-service"
            sudo systemctl status web1 --no-pager -l
          EOF

      - name: Health check production site
        run: |
          node - <<'NODE'
          const baseUrl = "https://cnzhengmu.com";
          const maxAttempts = 18;
          const retryDelayMs = 10000;

          function firstMatch(input, pattern) {
            const match = input.match(pattern);
            return match ? match[1] : "";
          }

          function normalizeAssetUrl(value) {
            if (!value) return "";
            if (value.startsWith("http://") || value.startsWith("https://")) return value;
            return new URL(value, baseUrl).toString();
          }

          async function fetchText(url) {
            const response = await fetch(url, { redirect: "follow" });
            const text = await response.text();
            return { response, text };
          }

          async function fetchHead(url) {
            return fetch(url, { method: "GET", redirect: "follow" });
          }

          function delay(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }

          (async () => {
            let lastFailures = [];

            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const failures = [];

              const homepage = await fetchText(baseUrl);
              const homepageStatus = homepage.response.status;
              console.log(`HEALTH attempt=${attempt}/${maxAttempts} homepage status=${homepageStatus}`);
              if (homepageStatus !== 200) {
                failures.push(`homepage expected 200 but got ${homepageStatus}`);
              }

              const html = homepage.text;
              const cssHref = normalizeAssetUrl(firstMatch(html, /href=\"([^\"]*\/_next\/static\/css\/[^"]+\.css[^"]*)\"/i));

              if (!cssHref) {
                failures.push("could not find homepage CSS asset");
              }

              if (cssHref) {
                const cssResponse = await fetchHead(cssHref);
                const cssType = cssResponse.headers.get("content-type") || "";
                console.log(`HEALTH attempt=${attempt}/${maxAttempts} css url=${cssHref}`);
                console.log(`HEALTH attempt=${attempt}/${maxAttempts} css status=${cssResponse.status} content_type=${cssType}`);
                if (cssResponse.status !== 200) {
                  failures.push(`css expected 200 but got ${cssResponse.status}`);
                }
                if (!/text\/css/i.test(cssType)) {
                  failures.push(`css expected text/css but got ${cssType || "missing"}`);
                }
              }

              if (failures.length === 0) {
                console.log(`HEALTH overall=ok after attempt ${attempt}`);
                return;
              }

              lastFailures = failures;
              console.warn(`::warning::[health] attempt ${attempt}/${maxAttempts} failed: ${failures.join(" | ")}`);
              if (attempt < maxAttempts) {
                await delay(retryDelayMs);
              }
            }

            for (const failure of lastFailures) {
              console.error(`::error::[health] ${failure}`);
            }
            process.exit(1);
          })().catch((error) => {
            console.error(`::error::[health] ${error instanceof Error ? error.stack || error.message : String(error)}`);
            process.exit(1);
          });
          NODE

      - name: Roll back production assets on failure
        if: failure()
        run: |
          ssh -o BatchMode=yes -p "${DEPLOY_PORT}" ${DEPLOY_USER}@${DEPLOY_HOST} << 'EOF'
            set -euo pipefail
            cd /home/web1
            BACKUP_MARKER_FILE="/tmp/web1-next-backup-path"

            if [ ! -f "${BACKUP_MARKER_FILE}" ]; then
              echo "::warning::[rollback] no backup marker present"
              exit 0
            fi

            backup_dir="$(cat "${BACKUP_MARKER_FILE}")"
            if [ -z "${backup_dir}" ] || [ ! -d "${backup_dir}" ]; then
              echo "::warning::[rollback] backup directory missing: ${backup_dir}"
              rm -f "${BACKUP_MARKER_FILE}"
              exit 0
            fi

            rm -rf .next
            mv "${backup_dir}" .next
            rm -f "${BACKUP_MARKER_FILE}"
            sudo systemctl restart web1
            sudo systemctl status web1 --no-pager -l || true
            echo "::warning::[rollback] restored previous .next and restarted web1"
          EOF

      - name: Remove backup after successful health check
        if: success()
        run: |
          ssh -o BatchMode=yes -p "${DEPLOY_PORT}" ${DEPLOY_USER}@${DEPLOY_HOST} << 'EOF'
            set -euo pipefail
            BACKUP_MARKER_FILE="/tmp/web1-next-backup-path"

            if [ ! -f "${BACKUP_MARKER_FILE}" ]; then
              exit 0
            fi

            backup_dir="$(cat "${BACKUP_MARKER_FILE}")"
            rm -f "${BACKUP_MARKER_FILE}"
            if [ -n "${backup_dir}" ] && [ -d "${backup_dir}" ]; then
              rm -rf "${backup_dir}"
              echo "::notice::[deploy] cleaned backup directory ${backup_dir}"
            fi
          EOF
