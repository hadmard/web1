          function pick(html, pattern) {
            const match = html.match(pattern);
            return match ? match[1] : "";
          }

          (async () => {
            for (const [oldUrl, newUrl] of samples) {
              const oldRes = await fetch(oldUrl, { redirect: "manual" });
              const newRes = await fetch(newUrl, { redirect: "manual" });
              const html = newRes.status === 200 ? await newRes.text() : "";
              const title = pick(html, /<title>([^<]*)<\/title>/i);
              const description = pick(html, /<meta[^>]+name="description"[^>]+content="([^"]*)"/i);
              const canonical = pick(html, /<link[^>]+rel="canonical"[^>]+href="([^"]*)"/i);

              console.log(`::warning::VERIFY old=${oldUrl} old_status=${oldRes.status} location=${oldRes.headers.get("location") || ""}`);
              console.log(`::warning::VERIFY new=${newUrl} new_status=${newRes.status} title=${title}`);
              console.log(`::warning::VERIFY meta description=${description}`);
              console.log(`::warning::VERIFY meta canonical=${canonical}`);
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
