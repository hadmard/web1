name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Inspect live production target
        run: |
          diag=$(ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "bash -s" <<'EOF'
            set -e

            host_name=$(hostname 2>/dev/null || true)
            host_ips=$(hostname -I 2>/dev/null | tr '\n' ';' || true)
            web1_detail=$(systemctl show web1 --no-pager -p Id -p ActiveState -p FragmentPath -p WorkingDirectory -p ExecStart -p EnvironmentFile 2>/dev/null | tr '\n' ';')
            services=$(systemctl list-units --type=service --all --no-pager | grep -Ei 'web1|node|next|pm2|cnzhengmu' | tr -s ' ' | tr '\n' ';' || true)
            ports=$(sudo ss -ltnp | grep -E ':80 |:443 |:3000 |:3001 |:3002 |:3010 |:3011 ' | tr '\n' ';' || true)
            nginx=$(sudo nginx -T 2>/dev/null | grep -nE 'server_name|proxy_pass|root |cnzhengmu\.com|www\.cnzhengmu\.com|127\.0\.0\.1|localhost|/home/web1' -C 2 | head -n 40 | tr '\n' ';' || true)

            if [ -f /home/web1/.env.production ]; then
              db_url=$(grep '^DATABASE_URL=' /home/web1/.env.production | head -n 1 | cut -d '=' -f 2- | tr -d '"')
            elif [ -f /home/web1/.env ]; then
              db_url=$(grep '^DATABASE_URL=' /home/web1/.env | head -n 1 | cut -d '=' -f 2- | tr -d '"')
            else
              db_url=""
            fi

            if [ -n "$db_url" ]; then
              db_no_proto=$(printf '%s' "$db_url" | sed -E 's#^postgres(ql)?://##')
              db_host=$(printf '%s' "$db_no_proto" | sed -E 's#^[^@]*@([^:/?]+).*#\1#')
              db_port=$(printf '%s' "$db_no_proto" | sed -En 's#^[^@]*@[^:/?]+:([0-9]+).*#\1#p')
              db_name=$(printf '%s' "$db_no_proto" | sed -E 's#^[^/]*/([^?]+).*#\1#')
              if [ -z "$db_port" ]; then
                db_port="5432"
              fi
              db_target="db_host=$db_host;db_port=$db_port;db_name=$db_name"
            else
              db_target="db_url_not_found"
            fi

            echo "HOST_NAME=$host_name"
            echo "HOST_IPS=$host_ips"
            echo "WEB1_DETAIL=$web1_detail"
            echo "SERVICES=$services"
            echo "PORTS=$ports"
            echo "NGINX=$nginx"
            echo "DB_TARGET=$db_target"
          EOF
          )

          while IFS= read -r line; do
            if [ -n "$line" ]; then
              echo "::warning::$line"
            fi
          done <<< "$diag"

      - name: Deploy to Server
        run: |
          ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            cd /home/web1

            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            npm ci
            npx prisma migrate deploy
            npm run build

            sudo systemctl restart web1
            sudo systemctl status web1 --no-pager -l
          EOF
