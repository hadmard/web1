name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Print CI runtime versions
        run: |
          echo "::notice::[validate] node=$(node -v)"
          echo "::notice::[validate] npm=$(npm -v)"

      - name: Enforce Node 20 in CI
        run: |
          NODE_MAJOR=$(node -v | sed 's/v//' | cut -d. -f1)
          if [ "$NODE_MAJOR" -ne 20 ]; then
            echo "❌ Node version must be 20.x"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build application
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Inspect live production target
        run: |
          diag=$(ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "bash -s" <<'EOF'
            set -e

            host_name=$(hostname 2>/dev/null || true)
            host_ips=$(hostname -I 2>/dev/null | tr '\n' ';' || true)
            server_node=$(node -v 2>/dev/null || true)
            server_npm=$(npm -v 2>/dev/null || true)
            web1_detail=$(systemctl show web1 --no-pager -p Id -p ActiveState -p FragmentPath -p WorkingDirectory -p ExecStart -p EnvironmentFile 2>/dev/null | tr '\n' ';')
            services=$(systemctl list-units --type=service --all --no-pager | grep -Ei 'web1|node|next|pm2|cnzhengmu' | tr -s ' ' | tr '\n' ';' || true)
            ports=$(sudo ss -ltnp | grep -E ':80 |:443 |:3000 |:3001 |:3002 |:3010 |:3011 ' | tr '\n' ';' || true)
            nginx=$(sudo nginx -T 2>/dev/null | grep -nE 'server_name|proxy_pass|root |cnzhengmu\.com|www\.cnzhengmu\.com|127\.0\.0\.1|localhost|/home/web1' -C 2 | head -n 40 | tr '\n' ';' || true)

            if [ -f /home/web1/.env.production ]; then
              db_url=$(grep '^DATABASE_URL=' /home/web1/.env.production | head -n 1 | cut -d '=' -f 2- | tr -d '"')
            elif [ -f /home/web1/.env ]; then
              db_url=$(grep '^DATABASE_URL=' /home/web1/.env | head -n 1 | cut -d '=' -f 2- | tr -d '"')
            else
              db_url=""
            fi

            if [ -n "$db_url" ]; then
              db_no_proto=$(printf '%s' "$db_url" | sed -E 's#^postgres(ql)?://##')
              db_host=$(printf '%s' "$db_no_proto" | sed -E 's#^[^@]*@([^:/?]+).*#\1#')
              db_port=$(printf '%s' "$db_no_proto" | sed -En 's#^[^@]*@[^:/?]+:([0-9]+).*#\1#p')
              db_name=$(printf '%s' "$db_no_proto" | sed -E 's#^[^/]*/([^?]+).*#\1#')
              if [ -z "$db_port" ]; then
                db_port="5432"
              fi
              db_target="db_host=$db_host;db_port=$db_port;db_name=$db_name"
            else
              db_target="db_url_not_found"
            fi

            echo "HOST_NAME=$host_name"
            echo "HOST_IPS=$host_ips"
            echo "SERVER_NODE=$server_node"
            echo "SERVER_NPM=$server_npm"
            echo "WEB1_DETAIL=$web1_detail"
            echo "SERVICES=$services"
            echo "PORTS=$ports"
            echo "NGINX=$nginx"
            echo "DB_TARGET=$db_target"
          EOF
          )

          while IFS= read -r line; do
            if [ -n "$line" ]; then
              echo "::warning::$line"
            fi
          done <<< "$diag"

      - name: Deploy to Server
        run: |
          ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -euo pipefail
            cd /home/web1
            stage="bootstrap"
            BACKUP_MARKER_FILE="/tmp/web1-next-backup-path"

            on_error() {
              code=$?
              echo "::error::[deploy] stage=${stage} command=${BASH_COMMAND} exit_code=${code}"
              sudo systemctl status web1 --no-pager -l || true
              exit "$code"
            }
            trap on_error ERR

            load_env() {
              if [ -f .env.production ]; then
                set -a
                . ./.env.production
                set +a
                echo "[deploy] loaded .env.production"
              elif [ -f .env ]; then
                set -a
                . ./.env
                set +a
                echo "[deploy] loaded .env"
              else
                echo "[deploy] no env file found in /home/web1"
              fi
            }

            restore_next_backup() {
              if [ -n "${NEXT_BACKUP_DIR:-}" ] && [ -d "${NEXT_BACKUP_DIR}" ]; then
                rm -rf .next
                mv "${NEXT_BACKUP_DIR}" .next
                rm -f "${BACKUP_MARKER_FILE}"
                echo "::warning::[deploy] restored previous .next backup"
              fi
            }

            stage="git"
            echo "[deploy] fetching latest main"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd -e .next

            stage="install"
            NODE_MAJOR=$(node -v | sed 's/v//' | cut -d. -f1)
            if [ "$NODE_MAJOR" -ne 20 ]; then
              echo "❌ Server Node version must be 20.x"
              exit 1
            fi
            echo "[deploy] installing dependencies"
            if ! npm ci --no-audit --no-fund; then
              echo "::warning::[deploy] npm ci failed, falling back to npm install"
              npm install --include=dev --no-audit --no-fund
            fi

            stage="env"
            load_env
            echo "::warning::[deploy] DATABASE_URL present: ${DATABASE_URL:+yes}"

            stage="prisma-generate"
            echo "[deploy] generating prisma client"
            npx prisma generate

            stage="prisma-sync"
            echo "[deploy] syncing prisma schema"
            if ! npx prisma migrate deploy; then
              echo "::warning::[deploy] prisma migrate deploy failed, falling back to prisma db push"
              if ! npx prisma db push; then
                echo "::warning::[deploy] prisma db push also failed, continuing with existing schema"
              fi
            fi

            stage="build"
            echo "[deploy] building next app"
            NEXT_BACKUP_DIR=""
            if [ -d .next ]; then
              NEXT_BACKUP_DIR=".next-backup-$(date +%s)"
              rm -rf "${NEXT_BACKUP_DIR}"
              mv .next "${NEXT_BACKUP_DIR}"
              printf '%s\n' "/home/web1/${NEXT_BACKUP_DIR}" > "${BACKUP_MARKER_FILE}"
              echo "::warning::[deploy] moved existing .next to ${NEXT_BACKUP_DIR}"
            else
              rm -f "${BACKUP_MARKER_FILE}"
            fi
            export NODE_OPTIONS="${NODE_OPTIONS:---max-old-space-size=4096}"
            export NEXT_TELEMETRY_DISABLED=1
            echo "::warning::[deploy] memory before build"
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                echo "::warning::[deploy] ${line}"
              fi
            done < <(free -h 2>/dev/null || true)
            set +e
            npm run build > /tmp/web1-build.log 2>&1
            build_exit_code=$?
            set -e
            if [ "$build_exit_code" -ne 0 ]; then
              echo "::error::[deploy] build exit code=${build_exit_code}"
              echo "::error::[deploy] memory after build failure"
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "::error::[deploy] ${line}"
                fi
              done < <(free -h 2>/dev/null || true)
              echo "::error::[deploy] dmesg tail begin"
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "::error::[deploy] ${line}"
                fi
              done < <(sudo dmesg 2>/dev/null | tail -n 50 || true)
              echo "::error::[deploy] dmesg tail end"
              echo "::error::[deploy] build output begin"
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "::error::[deploy] ${line}"
                fi
              done < <(sed -n '1,220p' /tmp/web1-build.log)
              echo "::error::[deploy] build output tail begin"
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "::error::[deploy] ${line}"
                fi
              done < <(tail -n 120 /tmp/web1-build.log)
              echo "::error::[deploy] build output tail end"
              echo "::error::[deploy] build output end"
              restore_next_backup
              exit "$build_exit_code"
            fi

            stage="restart"
            echo "[deploy] restarting web1"
            if ! sudo systemctl restart web1; then
              echo "::error::[deploy] web1 restart failed, dumping service logs"
              restore_next_backup
              sudo systemctl status web1 --no-pager -l || true
              sudo journalctl -u web1 -n 120 --no-pager || true
              exit 1
            fi
            stage="verify-service"
            sudo systemctl status web1 --no-pager -l
          EOF

      - name: Health check production site
        run: |
          node - <<'NODE'
          const baseUrl = "https://cnzhengmu.com";

          function firstMatch(input, pattern) {
            const match = input.match(pattern);
            return match ? match[1] : "";
          }

          function normalizeAssetUrl(value) {
            if (!value) return "";
            if (value.startsWith("http://") || value.startsWith("https://")) return value;
            return new URL(value, baseUrl).toString();
          }

          async function fetchText(url) {
            const response = await fetch(url, { redirect: "follow" });
            const text = await response.text();
            return { response, text };
          }

          async function fetchHead(url) {
            return fetch(url, { method: "GET", redirect: "follow" });
          }

          (async () => {
            const failures = [];

            const homepage = await fetchText(baseUrl);
            const homepageStatus = homepage.response.status;
            console.log(`HEALTH homepage status=${homepageStatus}`);
            if (homepageStatus !== 200) {
              failures.push(`homepage expected 200 but got ${homepageStatus}`);
            }

            const html = homepage.text;
            const cssHref = normalizeAssetUrl(firstMatch(html, /href=\"([^\"]*\/_next\/static\/css\/[^"]+\.css[^"]*)\"/i));
            const jsSrc = normalizeAssetUrl(firstMatch(html, /src=\"([^\"]*\/_next\/static\/chunks\/[^"]+\.js[^"]*)\"/i));

            if (!cssHref) {
              failures.push("could not find homepage CSS asset");
            }

            if (!jsSrc) {
              failures.push("could not find homepage JS asset");
            }

            if (cssHref) {
              const cssResponse = await fetchHead(cssHref);
              const cssType = cssResponse.headers.get("content-type") || "";
              console.log(`HEALTH css url=${cssHref}`);
              console.log(`HEALTH css status=${cssResponse.status} content_type=${cssType}`);
              if (cssResponse.status !== 200) {
                failures.push(`css expected 200 but got ${cssResponse.status}`);
              }
              if (!/text\/css/i.test(cssType)) {
                failures.push(`css expected text/css but got ${cssType || "missing"}`);
              }
            }

            if (jsSrc) {
              const jsResponse = await fetchHead(jsSrc);
              const jsType = jsResponse.headers.get("content-type") || "";
              console.log(`HEALTH js url=${jsSrc}`);
              console.log(`HEALTH js status=${jsResponse.status} content_type=${jsType}`);
              if (jsResponse.status !== 200) {
                failures.push(`js expected 200 but got ${jsResponse.status}`);
              }
              if (!/(application|text)\/javascript/i.test(jsType)) {
                failures.push(`js expected javascript content-type but got ${jsType || "missing"}`);
              }
            }

            if (failures.length > 0) {
              for (const failure of failures) {
                console.error(`::error::[health] ${failure}`);
              }
              process.exit(1);
            }

            console.log("HEALTH overall=ok");
          })().catch((error) => {
            console.error(`::error::[health] ${error instanceof Error ? error.stack || error.message : String(error)}`);
            process.exit(1);
          });
          NODE

      - name: Install or update production SEO cron
        run: |
          ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} <<'EOF'
            set -euo pipefail

            cd /home/web1
            sed -i 's/\r$//' /home/web1/scripts/run-seo-news-cron.sh

            if [ -f /home/web1/.env.production ]; then
              env_file="/home/web1/.env.production"
            else
              env_file="/home/web1/.env"
            fi

            if [ -f "$env_file" ]; then
              if grep -q '^SEO_NEWS_AUTOGEN_ENABLED=' "$env_file"; then
                sed -i 's/^SEO_NEWS_AUTOGEN_ENABLED=.*/SEO_NEWS_AUTOGEN_ENABLED=true/' "$env_file"
              else
                printf '\nSEO_NEWS_AUTOGEN_ENABLED=true\n' >> "$env_file"
              fi
            fi

            cron_tz="CRON_TZ=Asia/Shanghai"
            cron_entry_generate="30 7 * * * /bin/bash /home/web1/scripts/run-seo-news-cron.sh --count 3"
            cron_entry_check_740="40 7 * * * /bin/bash /home/web1/scripts/run-seo-news-cron.sh --mode check"
            cron_entry_check_800="0 8 * * * /bin/bash /home/web1/scripts/run-seo-news-cron.sh --mode check"

            tmp_cron="$(mktemp)"
            {
              crontab -l 2>/dev/null | grep -F -v 'CRON_TZ=Asia/Shanghai' | grep -F -v '/home/web1/scripts/run-seo-news-cron.sh' || true
              echo "$cron_tz"
              echo "$cron_entry_generate"
              echo "$cron_entry_check_740"
              echo "$cron_entry_check_800"
            } > "$tmp_cron"

            crontab "$tmp_cron"
            rm -f "$tmp_cron"

            echo "::warning::SEO_CRON_USER=$(whoami)"
            echo "::warning::SEO_CRON_ENV_FILE=$env_file"
            echo "::warning::SEO_CRON_AUTOGEN=$(grep '^SEO_NEWS_AUTOGEN_ENABLED=' \"$env_file\" 2>/dev/null || true)"
            echo "::warning::SEO_CRON_SERVER_TIME=$(date '+%Y-%m-%d %H:%M:%S %Z %z')"
            echo "::warning::SEO_CRON_TIMEZONE_FILE=$(cat /etc/timezone 2>/dev/null || true)"
            echo "::warning::SEO_CRON_TIMEDATECTL=$(timedatectl show --property=Timezone --value 2>/dev/null || true)"
            echo "::warning::SEO_CRON_LOG_FILE=/home/web1/logs/seo-news-cron.log"
            echo "::warning::SEO_CRON_STATUS_FILE=/home/web1/logs/seo-news-cron-status.json"
            echo "::warning::SEO_CRON_INSTALLED_BEGIN"
            crontab -l | while IFS= read -r line; do
              if [ -n "$line" ]; then
                echo "::warning::SEO_CRON_LINE=$line"
              fi
            done
            echo "::warning::SEO_CRON_INSTALLED_END"
          EOF

      - name: Manual production SEO generation validation
        run: |
          ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} <<'EOF'
            set -euo pipefail
            cd /home/web1

            if [ -f .env.production ]; then
              set -a
              . ./.env.production
              set +a
            elif [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi

            echo "::warning::SEO_MANUAL_COMMAND=/bin/bash /home/web1/scripts/run-seo-news-cron.sh --count 3 --mode manual"
            echo "::warning::SEO_MANUAL_EFFECTIVE_AUTOGEN=${SEO_NEWS_AUTOGEN_ENABLED:-unset}"
            start_iso="$(date -Iseconds)"
            set +e
            /bin/bash /home/web1/scripts/run-seo-news-cron.sh --count 3 --mode manual
            manual_exit=$?
            set -e

            if [ "$manual_exit" -ne 0 ]; then
              echo "::error::SEO_MANUAL_EXIT=$manual_exit"
              if [ -f /home/web1/logs/seo-news-cron-status.json ]; then
                while IFS= read -r line; do
                  if [ -n "$line" ]; then
                    echo "::warning::SEO_MANUAL_STATUS=$line"
                  fi
                done < /home/web1/logs/seo-news-cron-status.json
              fi
              tail -n 80 /home/web1/logs/seo-news-cron.log | while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "::warning::SEO_MANUAL_LOG=$line"
                fi
              done
              exit "$manual_exit"
            fi

            node - "$start_iso" <<'NODE'
            const { PrismaClient } = require("@prisma/client");

            const prisma = new PrismaClient();
            const since = new Date(process.argv[2]);

            (async () => {
              const latest = await prisma.article.findFirst({
                where: {
                  source: "auto_dual_line_seo_generator",
                  createdAt: { gte: since },
                },
                orderBy: [{ createdAt: "desc" }],
                select: {
                  generationBatchId: true,
                },
              });

              if (!latest?.generationBatchId) {
                throw new Error(`no_batch_found_since_${since.toISOString()}`);
              }

              const rows = await prisma.article.findMany({
                where: {
                  generationBatchId: latest.generationBatchId,
                },
                orderBy: [{ createdAt: "asc" }],
                select: {
                  id: true,
                  title: true,
                  status: true,
                  contentLine: true,
                  categoryLabel: true,
                  subCategoryLabel: true,
                  categoryHref: true,
                  subHref: true,
                  publishedAt: true,
                },
              });

              const ids = rows.map((row) => row.id);
              const jobs = ids.length
                ? await prisma.$queryRawUnsafe(
                    `SELECT article_id, status, source, pushed_at, last_error FROM baidu_push_jobs WHERE article_id IN (${ids.map((id) => `'${id}'`).join(",")}) ORDER BY article_id ASC`,
                  )
                : [];

              console.log(`::warning::SEO_MANUAL_BATCH_ID=${latest.generationBatchId}`);
              console.log(`::warning::SEO_MANUAL_SAVED_COUNT=${rows.length}`);
              console.log(`::warning::SEO_MANUAL_PENDING_COUNT=${rows.filter((row) => row.status === "pending").length}`);
              for (const row of rows) {
                console.log(
                  `::warning::SEO_MANUAL_ITEM=${JSON.stringify({
                    title: row.title,
                    status: row.status,
                    contentLine: row.contentLine,
                    categoryLabel: row.categoryLabel,
                    subCategoryLabel: row.subCategoryLabel,
                    categoryHref: row.categoryHref,
                    subHref: row.subHref,
                    publishedAt: row.publishedAt,
                  })}`,
                );
              }
              console.log(`::warning::SEO_MANUAL_BAIDU_JOBS=${JSON.stringify(jobs)}`);
            })()
              .catch((error) => {
                console.error(`::error::SEO_MANUAL_VERIFY_FAILED=${error instanceof Error ? error.stack || error.message : String(error)}`);
                process.exit(1);
              })
              .finally(async () => {
                await prisma.$disconnect();
              });
            NODE
          EOF

      - name: Simulate production SEO timer check
        run: |
          ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} <<'EOF'
            set -euo pipefail
            cd /home/web1

            /bin/bash /home/web1/scripts/run-seo-news-cron.sh --mode check

            echo "::warning::SEO_CHECK_STATUS_BEGIN"
            if [ -f /home/web1/logs/seo-news-cron-status.json ]; then
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "::warning::SEO_CHECK_STATUS=$line"
                fi
              done < /home/web1/logs/seo-news-cron-status.json
            fi
            echo "::warning::SEO_CHECK_STATUS_END"
            echo "::warning::SEO_CHECK_LOG_TAIL_BEGIN"
            tail -n 80 /home/web1/logs/seo-news-cron.log | while IFS= read -r line; do
              if [ -n "$line" ]; then
                echo "::warning::SEO_CHECK_LOG=$line"
              fi
            done
            echo "::warning::SEO_CHECK_LOG_TAIL_END"
          EOF

      - name: Roll back production assets on failure
        if: failure()
        run: |
          ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -euo pipefail
            cd /home/web1
            BACKUP_MARKER_FILE="/tmp/web1-next-backup-path"

            if [ ! -f "${BACKUP_MARKER_FILE}" ]; then
              echo "::warning::[rollback] no backup marker present"
              exit 0
            fi

            backup_dir="$(cat "${BACKUP_MARKER_FILE}")"
            if [ -z "${backup_dir}" ] || [ ! -d "${backup_dir}" ]; then
              echo "::warning::[rollback] backup directory missing: ${backup_dir}"
              rm -f "${BACKUP_MARKER_FILE}"
              exit 0
            fi

            rm -rf .next
            mv "${backup_dir}" .next
            rm -f "${BACKUP_MARKER_FILE}"
            sudo systemctl restart web1
            sudo systemctl status web1 --no-pager -l || true
            echo "::warning::[rollback] restored previous .next and restarted web1"
          EOF

      - name: Remove backup after successful health check
        if: success()
        run: |
          ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -euo pipefail
            BACKUP_MARKER_FILE="/tmp/web1-next-backup-path"

            if [ ! -f "${BACKUP_MARKER_FILE}" ]; then
              exit 0
            fi

            backup_dir="$(cat "${BACKUP_MARKER_FILE}")"
            rm -f "${BACKUP_MARKER_FILE}"
            if [ -n "${backup_dir}" ] && [ -d "${backup_dir}" ]; then
              rm -rf "${backup_dir}"
              echo "::notice::[deploy] cleaned backup directory ${backup_dir}"
            fi
          EOF

      - name: Sync 10 sample news articles to production database
        continue-on-error: true
        run: |
          echo "sync local: start"
          echo "sync local: before ssh"
          ssh -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} <<'EOF'
          cd /home/web1
          echo "sync remote: entered"
          whoami
          pwd
          node -v
          echo "database_url_present=${DATABASE_URL:+yes}"
          npx ts-node --transpile-only -P scripts/tsconfig.scripts.json scripts/sync-prod-sample-news.ts
          echo "sync remote: after script"
          echo "sync remote: end"
          EOF
          echo "sync local: after ssh"

      - name: Verify 10 sample news URLs
        continue-on-error: true
        run: |
          sleep 15
          node - <<'NODE'
          const samples = [
            ["https://cnzhengmu.com/news/qiye/129759.html", "https://cnzhengmu.com/news/ju-shi-jiang-cheng-zhi-ling-zheng-zhuang-zhong-guo-fan-jia-ju-chuang-xin-lun-tan"],
            ["https://cnzhengmu.com/companynews/10665932-182579728.html", "https://cnzhengmu.com/news/si-lu-qi-dian-she-ji-xin-zhang-2025-xi-an-dang-dai-she-ji-zhou-sheng-da-qi-mu"],
            ["https://cnzhengmu.com/news/qiye/129029.html", "https://cnzhengmu.com/news/ao-mu-zhi-neng-hu-yan-deng-shang-shi-yong-dong-ni-de-dong-tai-zi-ran-guang-da-za"],
            ["https://cnzhengmu.com/companynews/10665932-182579618.html", "https://cnzhengmu.com/news/20-wan-ren-ci-gong-fu-xi-bu-she-ji-kuang-huan-2025-xi-an-dang-dai-she-ji-zhou-yu"],
            ["https://cnzhengmu.com/companynews/10665932-182579062.html", "https://cnzhengmu.com/news/ke-ji-yin-ling-xiao-liang-ling-xian-an-ji-er-shang-yong-zhi-ji-xi-lie-xin-pin-fa"],
            ["https://cnzhengmu.com/news/shichang/130093.html", "https://cnzhengmu.com/news/2025-nian-shi-jie-lin-mu-ye-da-hui-ji-2025-nian-guang-xi-guo-ji-lin-chan-pin-ji-"],
            ["https://cnzhengmu.com/companynews/10665932-182579200.html", "https://cnzhengmu.com/news/ao-shi-mi-si-hei-ke-ji-tu-po-quan-shi-gao-shui-xiao-heng-jing-xi-tong-zhong-su-b"],
